server {
    listen 80;
    server_name localhost;

    # Serve static frontend files at /portfoliotracker
    location /portfoliotracker/ {
        alias /usr/share/nginx/html/portfoliotracker/;
        index index.html;
        try_files $uri $uri/ /portfoliotracker/index.html;
    }

    # Proxy API calls to backend FastAPI server
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect root url to /portfoliotracker/
    location = / {
        return 301 /portfoliotracker/;
    }
}
